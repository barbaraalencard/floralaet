<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login | Flora Laet</title>
    <link rel="stylesheet" href="styles.css?v=20260704n" />
  </head>
  <body class="auth-page">
    <main class="auth-card" aria-labelledby="loginTitle">
      <a class="script-logo" href="index.html">Flora<br />Laet</a>
      <h1 id="loginTitle">área da flora</h1>
      <p>entre para atualizar a escrivaninha, os bilhetes e os extras.</p>

      <form id="loginForm">
        <label>
          <span>e-mail</span>
          <input
            id="email"
            name="email"
            type="email"
            autocomplete="username"
            placeholder="seu e-mail de autora"
          />
        </label>
        <label>
          <span>senha</span>
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="current-password"
            required
          />
        </label>
        <div class="auth-actions">
          <button class="button primary" type="submit">entrar</button>
          <a class="button ghost" href="index.html">voltar ao site</a>
        </div>
        <p class="login-status" id="loginStatus" role="status" aria-live="polite"></p>
      </form>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js?v=20260703h" charset="utf-8"></script>
    <script src="data.js?v=20260704k" charset="utf-8"></script>
    <script src="admin.js?v=20260704o" charset="utf-8"></script>
  </body>
</html>
